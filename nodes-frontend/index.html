  <title>Nodes — Новый взгляд на формирование привычек</title>
    <script>
      (function () {
        try {
          var storage = localStorage.getItem('nodes-theme-storage');
          var mode = 'dark';
          var colors = null;
          if (storage) {
            var parsed = JSON.parse(storage);
            mode = parsed.state && parsed.state.config && parsed.state.config.mode || 'dark';
            colors = parsed.state && parsed.state.config && parsed.state.config.colors && parsed.state.config.colors[mode] || null;
          }
          var root = document.documentElement;
          if (mode === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');

          var bg = colors && colors['--background'] || (mode === 'dark' ? '#030303' : '#ffffff');
          var fg = colors && colors['--foreground'] || (mode === 'dark' ? '#ffffff' : '#000000');

          // Set inline style directly (no !important, React will override after hydration)
          root.style.setProperty('--background', bg);
          root.style.setProperty('--foreground', fg);
          if (colors) {
            Object.keys(colors).forEach(function (token) {
              root.style.setProperty(token, colors[token]);
            });
          }
        } catch (e) {}
      })();
    </script>
