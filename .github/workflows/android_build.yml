name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: nodes-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: nodes-frontend
        run: npm ci

      - name: Run Tests
        working-directory: nodes-frontend
        run: npx vitest run

      - name: Create .env.production
        working-directory: nodes-frontend
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env.production
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.production
          echo "VITE_DJANGO_API_URL=${{ secrets.VITE_DJANGO_API_URL }}" >> .env.production

      - name: Build Web Assets & Sync Capacitor
        working-directory: nodes-frontend
        run: npm run mobile:build:prod

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('nodes-frontend/android/**/*.gradle*', 'nodes-frontend/android/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle Executable
        working-directory: nodes-frontend/android
        run: chmod +x gradlew

      - name: Build Android APK
        working-directory: nodes-frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: nodes-frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
