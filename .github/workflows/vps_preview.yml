name: VPS Preview (Dev Branch)

on:
  push:
    branches: [ dev ]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Build and push Preview Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./nodes-backend
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/nodes-backend:preview
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Preview Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./nodes-frontend
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/nodes-frontend:preview
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            VITE_API_URL=https://preview.nodes-tracker.ru
            VITE_DJANGO_API_URL=https://preview.nodes-tracker.ru/api/v1
            VITE_SITE_URL=https://app-preview.nodes-tracker.ru
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Preview to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /root/nodes-preview
            cd /root/nodes-preview
            
            # Создаем .env файл из секретов GitHub
            cat <<EOF > .env
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET || secrets.JWT_SECRET }}
            DEBUG=True
            SITE_URL=https://app-preview.nodes-tracker.ru
            VITE_API_URL=https://preview.nodes-tracker.ru
            CORS_ALLOWED_ORIGINS=https://app-preview.nodes-tracker.ru,https://nodes-tracker.ru,http://localhost:5173
            EOF
            
            cat <<EOF > docker-compose.yml
            services:
              backend-preview:
                image: ghcr.io/${{ env.OWNER_LC }}/nodes-backend:preview
                env_file: .env
                networks:
                  - coolify
                restart: always
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.nodes-preview-backend.rule=Host(\`preview.nodes-tracker.ru\`)"
                  - "traefik.http.routers.nodes-preview-backend.entrypoints=https"
                  - "traefik.http.routers.nodes-preview-backend.tls.certresolver=letsencrypt"
                  - "traefik.http.services.nodes-preview-backend.loadbalancer.server.port=8000"

              frontend-preview:
                image: ghcr.io/${{ env.OWNER_LC }}/nodes-frontend:preview
                networks:
                  - coolify
                restart: always
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.nodes-preview-frontend.rule=Host(\`app-preview.nodes-tracker.ru\`)"
                  - "traefik.http.routers.nodes-preview-frontend.entrypoints=https"
                  - "traefik.http.routers.nodes-preview-frontend.tls.certresolver=letsencrypt"
                  - "traefik.http.services.nodes-preview-frontend.loadbalancer.server.port=80"

            networks:
              coolify:
                external: true
            EOF
            
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
