name: Deploy Frontend to Vercel

on:
  push:
    branches: [ main ]
    paths:
      - 'nodes-frontend/**'
      - '!nodes-frontend/android/**'
      - '!nodes-frontend/ios/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: nodes-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: nodes-frontend
        run: npm ci

      - name: Create .env.production
        working-directory: nodes-frontend
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env.production
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.production
          echo "VITE_DJANGO_API_URL=${{ secrets.VITE_DJANGO_API_URL }}" >> .env.production

      - name: Build
        working-directory: nodes-frontend
        run: npm run build

      - name: Deploy to Vercel
        uses: vercel/action-deploy@v1
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: nodes-frontend/dist
