name: Build iOS App

on:
  workflow_dispatch: # Только ручной запуск (macOS раннер платный)
  push:
    branches: [ main ]
    paths:
      - 'nodes-frontend/ios/**'
      - 'nodes-frontend/capacitor.config.ts'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: nodes-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: nodes-frontend
        run: npm ci

      - name: Create .env.production
        working-directory: nodes-frontend
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env.production
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.production
          echo "VITE_DJANGO_API_URL=${{ secrets.VITE_DJANGO_API_URL }}" >> .env.production

      - name: Build Web Assets & Sync Capacitor
        working-directory: nodes-frontend
        run: npm run mobile:build:prod

      - name: Build iOS (Simulator)
        working-directory: nodes-frontend/ios/App
        run: |
          xcodebuild build -scheme App -destination 'platform=iOS Simulator,name=iPhone 15' -derivedDataPath DerivedData

      - name: Upload iOS Build
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: nodes-frontend/ios/App/DerivedData
          retention-days: 7
